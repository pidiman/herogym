services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: herogym-web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8091}:80"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  db:
    image: postgres:16-alpine
    container_name: herogym-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - herogym-db-data:/var/lib/postgresql/data
      - ./server/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - internal
      - adminer
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  internal:
    driver: bridge
  adminer:
    external: true
    name: ${ADMINER_NETWORK:-adminer}

volumes:
  herogym-db-data:
