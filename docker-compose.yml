services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: herogym-web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8091}:80"
    networks:
      - internal
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: herogym-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3078
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASS}@db:5432/${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3078/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  db:
    image: postgres:16-alpine
    container_name: herogym-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - herogym-db-data:/var/lib/postgresql/data
      - ./server/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - internal
      - adminer
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  internal:
    driver: bridge
  adminer:
    external: true
    name: ${ADMINER_NETWORK:-db-shared}

volumes:
  herogym-db-data:
